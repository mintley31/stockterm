<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STOCKTERM</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#08090b;--bg2:#0d1117;--bg3:#131920;--bg4:#1a2333;
  --border:#1e2d3d;--border2:#253649;
  --text:#c8d8e8;--muted:#4a6070;
  --accent:#00d4ff;--green:#00e676;--red:#ff3d57;--amber:#ffab00;--purple:#bb86fc;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;}

/* TOPBAR */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 18px;height:50px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;}
.logo{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;color:var(--accent);letter-spacing:3px;flex-shrink:0;}
.logo span{color:var(--muted);font-weight:400;}
.idx-strip{display:flex;gap:6px;overflow-x:auto;flex:1;}
.idx-strip::-webkit-scrollbar{display:none;}
.idx-pill{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:4px 10px;white-space:nowrap;cursor:default;}
.iname{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;}
.ival{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;}
.ichg{font-family:'IBM Plex Mono',monospace;font-size:10px;}
.topbar-r{display:flex;align-items:center;gap:12px;flex-shrink:0;}
.live{display:flex;align-items:center;gap:5px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.clk{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--accent);}

/* NAV */
.nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 18px;display:flex;}
.ntab{padding:10px 16px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.5px;user-select:none;}
.ntab:hover{color:var(--text);}
.ntab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* PAGES */
.page{display:none;padding:14px 18px;}
.page.active{display:block;}

/* PANEL */
.panel{background:var(--bg3);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:12px;}
.ph{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;}
.pt{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:1px;}
.pb{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);background:var(--bg4);padding:2px 8px;border-radius:3px;border:1px solid var(--border);}

/* BUTTONS */
.rbtn{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);background:transparent;border:1px solid var(--border);border-radius:3px;padding:3px 9px;cursor:pointer;transition:all .15s;}
.rbtn:hover{color:var(--accent);border-color:var(--accent);}
.sp{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:3px 9px;background:var(--bg4);border:1px solid var(--border);border-radius:3px;color:var(--muted);cursor:pointer;transition:all .15s;user-select:none;}
.sp:hover{color:var(--text);border-color:var(--border2);}
.sp.active{color:var(--accent);border-color:var(--accent);background:rgba(0,212,255,.07);}
.tf{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:2px 9px;background:transparent;border:1px solid var(--border);border-radius:3px;color:var(--muted);cursor:pointer;transition:all .15s;user-select:none;}
.tf:hover{color:var(--text);}
.tf.active{color:var(--accent);border-color:var(--accent);background:rgba(0,212,255,.05);}
.add-btn{background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);border-radius:4px;padding:7px 14px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent);cursor:pointer;transition:all .15s;}
.add-btn:hover{background:rgba(0,212,255,.18);}
.sm-btn{background:transparent;border:1px solid var(--border2);border-radius:3px;padding:5px 12px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);cursor:pointer;transition:all .15s;}
.sm-btn:hover{color:var(--accent);border-color:var(--accent);}

/* LAYOUT */
.dash-grid{display:grid;grid-template-columns:1fr 300px;gap:12px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.four-col{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
.rec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}

/* CHART */
.chart-wrap{padding:12px 14px;}
.chart-hdr{display:flex;align-items:baseline;gap:10px;margin-bottom:8px;}
.cprice{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;}
.cchg{font-family:'IBM Plex Mono',monospace;font-size:13px;}
.tf-row{display:flex;gap:4px;margin-bottom:10px;}
.sp-row{display:flex;gap:5px;flex-wrap:wrap;padding:8px 14px;border-bottom:1px solid var(--border);}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);padding:7px 14px;border-bottom:1px solid var(--border);text-align:left;letter-spacing:.5px;}
.tbl th.r{text-align:right;}
.tbl td{padding:7px 14px;border-bottom:1px solid rgba(30,45,61,.5);font-size:12px;transition:background .1s;}
.tbl td.r{font-family:'IBM Plex Mono',monospace;font-size:12px;text-align:right;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:rgba(0,212,255,.03);cursor:pointer;}
.sn{font-weight:500;color:var(--text);}
.sc{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);}

/* COLORS */
.up{color:var(--green);}
.dn{color:var(--red);}

/* PORTFOLIO PANEL */
.port-item{display:flex;align-items:center;gap:10px;padding:7px 14px;border-bottom:1px solid rgba(30,45,61,.5);}
.port-item:last-child{border-bottom:none;}
.pdot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.pbar-bg{width:100%;height:2px;background:var(--bg4);border-radius:2px;margin-top:4px;}
.pbar-fill{height:100%;border-radius:2px;transition:width .4s;}
.total-box{padding:10px 14px;border-top:1px solid var(--border);}
.tlbl{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;}
.tval{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:600;margin-top:2px;}

/* NEWS */
.nitem{padding:9px 14px;border-bottom:1px solid rgba(30,45,61,.5);cursor:pointer;transition:background .15s;}
.nitem:last-child{border-bottom:none;}
.nitem:hover{background:rgba(0,212,255,.025);}
.ntime{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:3px;}
.ntitle{font-size:12px;line-height:1.45;color:var(--text);}
.ntag{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:9px;padding:1px 5px;border-radius:2px;margin-right:4px;vertical-align:middle;}
.tkr{background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.2);}
.tus{background:rgba(0,212,255,.08);color:var(--accent);border:1px solid rgba(0,212,255,.2);}
.thot{background:rgba(255,61,87,.1);color:var(--red);border:1px solid rgba(255,61,87,.2);}

/* HEATMAP */
.heatmap{padding:10px 14px;display:grid;grid-template-columns:repeat(6,1fr);gap:5px;}
.hcell{border-radius:4px;padding:7px 4px;text-align:center;cursor:pointer;transition:opacity .15s;}
.hcell:hover{opacity:.8;}
.hname{font-size:10px;font-weight:500;color:rgba(255,255,255,.9);}
.hpct{font-family:'IBM Plex Mono',monospace;font-size:10px;color:rgba(255,255,255,.7);margin-top:2px;}

/* COMPARE */
.srch-wrap{position:relative;display:inline-block;}
.srch{background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:7px 12px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text);outline:none;width:230px;}
.srch:focus{border-color:var(--accent);}
.srch::placeholder{color:var(--muted);}
.ac{position:absolute;top:38px;left:0;width:280px;background:var(--bg2);border:1px solid var(--border2);border-radius:4px;z-index:50;display:none;overflow:hidden;}
.ac-item{padding:7px 12px;font-family:'IBM Plex Mono',monospace;font-size:11px;cursor:pointer;display:flex;gap:8px;align-items:center;}
.ac-item:hover{background:var(--bg4);}
.ac-sym{color:var(--accent);}
.ac-nm{color:var(--muted);font-size:10px;}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0;}
.chip{background:var(--bg4);border:1px solid var(--border2);border-radius:3px;padding:4px 10px;font-family:'IBM Plex Mono',monospace;font-size:11px;display:inline-flex;align-items:center;gap:6px;}
.cdot{width:7px;height:7px;border-radius:50%;}
.cx{color:var(--muted);cursor:pointer;font-size:15px;line-height:1;}
.cx:hover{color:var(--red);}

/* PORTFOLIO PAGE */
.sum-card{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:12px 14px;}
.sl{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.5px;}
.sv{font-family:'IBM Plex Mono',monospace;font-size:17px;font-weight:500;margin-top:4px;}
.add-row{display:flex;gap:6px;padding:10px 14px;border-top:1px solid var(--border);background:var(--bg2);flex-wrap:wrap;}
.add-row input{background:var(--bg4);border:1px solid var(--border2);border-radius:3px;padding:5px 10px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text);outline:none;flex:1;min-width:70px;}
.add-row input:focus{border-color:var(--accent);}
.add-row input::placeholder{color:var(--muted);}

/* RECOMMEND */
.rc{background:var(--bg3);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color .2s;}
.rc:hover{border-color:var(--border2);}
.rc-hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:9px 14px;display:flex;justify-content:space-between;}
.rc-body{padding:14px;}
.rc-tick{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:var(--accent);}
.rc-rsn{font-size:11px;color:var(--muted);line-height:1.5;margin-top:7px;}
.rc-meta{display:flex;gap:10px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);}
.rmi{flex:1;}
.rml{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:2px;}
.rmv{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:500;}

/* MISC */
.spinner{display:inline-block;width:11px;height:11px;border:1.5px solid var(--muted);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.lrow td{text-align:center;padding:18px;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:11px;}
.err-txt{color:var(--red);font-family:'IBM Plex Mono',monospace;font-size:11px;padding:10px 14px;}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">STOCK<span>TERM</span></div>
  <div class="idx-strip" id="idxStrip">
    <div class="idx-pill"><span class="iname">KOSPI</span><span class="ival" id="i-ks">—</span><span class="ichg" id="i-ks-c"></span></div>
    <div class="idx-pill"><span class="iname">KOSDAQ</span><span class="ival" id="i-kq">—</span><span class="ichg" id="i-kq-c"></span></div>
    <div class="idx-pill"><span class="iname">S&P500</span><span class="ival" id="i-sp">—</span><span class="ichg" id="i-sp-c"></span></div>
    <div class="idx-pill"><span class="iname">NASDAQ</span><span class="ival" id="i-nq">—</span><span class="ichg" id="i-nq-c"></span></div>
    <div class="idx-pill"><span class="iname">USD/KRW</span><span class="ival" id="i-fx">—</span><span class="ichg" id="i-fx-c"></span></div>
    <div class="idx-pill"><span class="iname">BTC</span><span class="ival" id="i-btc">—</span><span class="ichg" id="i-btc-c"></span></div>
  </div>
  <div class="topbar-r">
    <div class="live"><div class="ldot"></div>LIVE</div>
    <div class="clk" id="clk">--:--:--</div>
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <div class="ntab active" data-page="dashboard">대시보드</div>
  <div class="ntab" data-page="compare">종목 비교</div>
  <div class="ntab" data-page="portfolio">포트폴리오</div>
  <div class="ntab" data-page="news">뉴스</div>
  <div class="ntab" data-page="recommend">종목 추천</div>
</div>

<!-- ═══════════ DASHBOARD ═══════════ -->
<div class="page active" id="page-dashboard">
  <div class="dash-grid">
    <div>
      <!-- Chart panel -->
      <div class="panel">
        <div class="ph">
          <span class="pt">차트</span>
          <div style="display:flex;gap:6px;align-items:center;">
            <span class="pb" id="chartBadge">로딩</span>
            <button class="rbtn" id="chartRefreshBtn">↻ 새로고침</button>
          </div>
        </div>
        <div class="sp-row" id="spRow">
          <button class="sp active" data-sym="^KS11"     data-name="KOSPI">KOSPI</button>
          <button class="sp"        data-sym="^KQ11"     data-name="KOSDAQ">KOSDAQ</button>
          <button class="sp"        data-sym="005930.KS" data-name="삼성전자">삼성전자</button>
          <button class="sp"        data-sym="000660.KS" data-name="SK하이닉스">SK하이닉스</button>
          <button class="sp"        data-sym="NVDA"      data-name="NVIDIA">NVDA</button>
          <button class="sp"        data-sym="AAPL"      data-name="Apple">AAPL</button>
          <button class="sp"        data-sym="TSLA"      data-name="Tesla">TSLA</button>
          <button class="sp"        data-sym="^GSPC"     data-name="S&P500">S&P500</button>
          <button class="sp"        data-sym="MSFT"      data-name="Microsoft">MSFT</button>
          <button class="sp"        data-sym="META"      data-name="Meta">Meta</button>
        </div>
        <div class="chart-wrap">
          <div class="chart-hdr">
            <span class="cprice" id="cPrice">—</span>
            <span class="cchg" id="cChg"></span>
            <span style="font-size:11px;color:var(--muted);margin-left:4px" id="cName">KOSPI</span>
          </div>
          <div class="tf-row">
            <button class="tf"        data-r="1d"  data-i="5m">1일</button>
            <button class="tf active" data-r="5d"  data-i="1h">1주</button>
            <button class="tf"        data-r="1mo" data-i="1d">1개월</button>
            <button class="tf"        data-r="3mo" data-i="1d">3개월</button>
            <button class="tf"        data-r="1y"  data-i="1wk">1년</button>
          </div>
          <canvas id="mainChart" height="160"></canvas>
        </div>
      </div>

      <!-- Watchlist -->
      <div class="panel">
        <div class="ph">
          <span class="pt">주요 종목</span>
          <button class="rbtn" id="wlRefreshBtn">↻ 새로고침</button>
        </div>
        <table class="tbl">
          <thead><tr><th>종목</th><th class="r">현재가</th><th class="r">등락률</th><th class="r">거래량</th></tr></thead>
          <tbody id="wlBody"><tr class="lrow"><td colspan="4"><div class="spinner"></div> 로딩 중...</td></tr></tbody>
        </table>
      </div>

      <!-- Heatmap -->
      <div class="panel">
        <div class="ph">
          <span class="pt">섹터 히트맵</span>
          <button class="rbtn" id="hmRefreshBtn">↻ 새로고침</button>
        </div>
        <div class="heatmap" id="heatmap"><div class="spinner" style="margin:14px auto;display:block;"></div></div>
      </div>
    </div>

    <!-- RIGHT COL -->
    <div>
      <div class="panel">
        <div class="ph"><span class="pt">포트폴리오 요약</span></div>
        <div id="dashPort"></div>
        <div class="total-box">
          <div class="tlbl">총 평가금액</div>
          <div class="tval" id="dashTotal">—</div>
          <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;margin-top:2px;" id="dashPnl"></div>
        </div>
      </div>
      <div class="panel">
        <div class="ph">
          <span class="pt">실시간 뉴스</span>
          <button class="rbtn" id="newsRefreshBtn">↻ 새로고침</button>
        </div>
        <div id="dashNews"></div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════ COMPARE ═══════════ -->
<div class="page" id="page-compare">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;">
    <div class="srch-wrap">
      <input class="srch" id="cmpSearch" placeholder="티커 입력 (예: AAPL, 005930.KS)">
      <div class="ac" id="cmpAC"></div>
    </div>
    <button class="add-btn" id="cmpAddBtn">+ 추가</button>
    <button class="sm-btn" id="cmpRefreshBtn">↻ 새로고침</button>
  </div>
  <div class="chip-row" id="cmpChips"></div>
  <div class="panel">
    <div class="ph"><span class="pt">수익률 비교 (3개월)</span><span class="pb" id="cmpBadge">대기 중</span></div>
    <div style="padding:12px 14px;"><canvas id="cmpChart" height="180"></canvas></div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:4px;" id="cmpStats"></div>
</div>

<!-- ═══════════ PORTFOLIO ═══════════ -->
<div class="page" id="page-portfolio">
  <div class="four-col" id="portSummary">
    <div class="sum-card"><div class="sl">총 투자금액</div><div class="sv" id="pInvest">₩0</div></div>
    <div class="sum-card"><div class="sl">총 평가금액</div><div class="sv" id="pVal">₩0</div></div>
    <div class="sum-card"><div class="sl">총 손익</div><div class="sv" id="pPnl">₩0</div></div>
    <div class="sum-card"><div class="sl">수익률</div><div class="sv" id="pRt">0%</div></div>
  </div>
  <div class="two-col">
    <div class="panel">
      <div class="ph">
        <span class="pt">보유 종목</span>
        <button class="rbtn" id="portRefreshBtn">↻ 현재가 갱신</button>
      </div>
      <table class="tbl">
        <thead><tr><th>종목</th><th class="r">평균단가</th><th class="r">수량</th><th class="r">현재가</th><th class="r">손익률</th><th></th></tr></thead>
        <tbody id="portBody"><tr class="lrow"><td colspan="6">종목을 추가해 주세요</td></tr></tbody>
      </table>
      <div class="add-row">
        <input id="pSym"   placeholder="티커 (예: AAPL)">
        <input id="pName"  placeholder="종목명">
        <input id="pPrice" type="number" placeholder="단가">
        <input id="pQty"   type="number" placeholder="수량">
        <button class="sm-btn" id="portAddBtn">+ 추가</button>
      </div>
    </div>
    <div class="panel">
      <div class="ph"><span class="pt">비중</span></div>
      <div style="padding:14px;max-width:280px;margin:0 auto;">
        <canvas id="pieChart" height="220"></canvas>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════ NEWS ═══════════ -->
<div class="page" id="page-news">
  <div class="two-col">
    <div class="panel">
      <div class="ph"><span class="pt">국내 주식 뉴스</span><button class="rbtn" id="newsKRRefreshBtn">↻ 새로고침</button></div>
      <div id="newsKR"></div>
    </div>
    <div class="panel">
      <div class="ph"><span class="pt">해외 주식 뉴스</span><button class="rbtn" id="newsUSRefreshBtn">↻ 새로고침</button></div>
      <div id="newsUS"></div>
    </div>
  </div>
</div>

<!-- ═══════════ RECOMMEND ═══════════ -->
<div class="page" id="page-recommend">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
    <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);">모멘텀 · 기술적 지표 기반 종목 추천</span>

// ═══════════════════════════════════════════════════
const isKR = s => s.includes('.KS') || s.includes('.KQ') || s.startsWith('^K');
const currency = s => isKR(s) ? '₩' : '$';
const fmt = (n, d=2) => n == null ? null : parseFloat(n).toLocaleString('ko-KR', {minimumFractionDigits:d, maximumFractionDigits:d});
const fmtP = (v, sym) => v == null ? '—' : currency(sym) + (isKR(sym) ? Math.round(v).toLocaleString('ko-KR') : fmt(v));
const fmtV = v => v == null ? '—' : v >= 1e8 ? (v/1e8).toFixed(1)+'억' : v >= 1e4 ? (v/1e4).toFixed(0)+'만' : v.toLocaleString();
const clr  = v => v == null ? '' : v > 0 ? 'up' : v < 0 ? 'dn' : '';
const chgStr = v => v == null ? '—' : (v >= 0 ? '▲' : '▼') + Math.abs(v).toFixed(2) + '%';
const heatBg = p => {
  if (p == null) return '#1a2333';
  const v = Math.max(-5, Math.min(5, p));
  if (v >= 0) { const t=v/5; return `rgb(${Math.round(20)},${Math.round(50+t*170)},${Math.round(40+t*70)})`; }
  else         { const t=Math.abs(v)/5; return `rgb(${Math.round(20+t*220)},${Math.round(40-t*20)},${Math.round(40)})`; }
};

async function api(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

const IDX = [
  ['^KS11','i-ks'],['^KQ11','i-kq'],['^GSPC','i-sp'],
  ['^IXIC','i-nq'],['KRW=X','i-fx'],['BTC-USD','i-btc'],
];
async function loadIndices() {
  try {
    const d = await api('/api/indices');
    const quotes = d.quoteResponse?.result || [];
    IDX.forEach(([sym, id]) => {
      const q = quotes.find(x => x.symbol === sym);
      if (!q) return;
      const v = q.regularMarketPrice;
      const c = q.regularMarketChangePercent;
      const vEl = document.getElementById(id);
      const cEl = document.getElementById(id + '-c');
      if (vEl) vEl.textContent = sym === 'BTC-USD' ? '$' + Math.round(v).toLocaleString() :
                                  sym === 'KRW=X'   ? fmt(v,2)+'원' : fmt(v,2);
      if (cEl) { cEl.textContent = chgStr(c); cEl.className = 'ichg ' + clr(c); }
    });
  } catch(e) { console.warn('indices failed:', e.message); }
}

// ═══════════════════════════════════════════════════
// CHART
// ═══════════════════════════════════════════════════
async function loadChart() {
  document.getElementById('chartBadge').innerHTML = '<div class="spinner"></div>';
  try {
    const d = await api(`/api/chart/${encodeURIComponent(curSym)}?range=${curRange}&interval=${curInterval}`);
    const res = d.chart?.result?.[0];
    if (!res) throw new Error('no result');

    const ts     = res.timestamp || [];
    const closes = res.indicators?.quote?.[0]?.close || [];
    const labels = ts.map(t => {
      const dt = new Date(t * 1000);
      if (curRange === '1d') return `${dt.getHours()}:${String(dt.getMinutes()).padStart(2,'0')}`;
      if (curRange === '5d') return `${dt.getMonth()+1}/${dt.getDate()} ${dt.getHours()}h`;
      return `${dt.getMonth()+1}/${dt.getDate()}`;
    });

    const vals  = closes.map(v => v ?? null);
    const first = vals.find(v => v != null);
    const last  = [...vals].reverse().find(v => v != null);
    const pct   = first && last ? (last - first) / first * 100 : 0;
    const isUp  = pct >= 0;
    const color = isUp ? '#00e676' : '#ff3d57';

    document.getElementById('cPrice').textContent = fmtP(last, curSym);
    const cEl = document.getElementById('cChg');
    cEl.textContent = chgStr(pct);
    cEl.className = 'cchg ' + clr(pct);
    document.getElementById('chartBadge').textContent = '실시간';

    const ctx  = document.getElementById('mainChart').getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, 220);
    grad.addColorStop(0, isUp ? 'rgba(0,230,118,.18)' : 'rgba(255,61,87,.18)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');

    if (mainChartObj) mainChartObj.destroy();
    mainChartObj = new Chart(ctx, {
      type: 'line',
      data: { labels, datasets: [{
        data: vals, borderColor: color, borderWidth: 1.5,
        backgroundColor: grad, fill: true,
        pointRadius: 0, tension: 0.3, spanGaps: true,
      }]},
      options: {
        responsive: true, animation: false,
        plugins: { legend: { display: false }, tooltip: {
          mode: 'index', intersect: false,
          callbacks: { label: i => fmtP(i.raw, curSym) }
        }},
        scales: {
          x: { ticks: { color:'#4a6070', font:{size:10}, maxTicksLimit:8 }, grid: { color:'rgba(30,45,61,.4)' } },
          y: { position:'right', ticks: { color:'#4a6070', font:{size:10}, callback: v => fmtP(v, curSym) }, grid: { color:'rgba(30,45,61,.4)' } }
        }
      }
    });
  } catch(e) {
    document.getElementById('chartBadge').textContent = '오류';
    console.warn('chart failed:', e.message);
  }
}

  const items = portfolio.length ? portfolio.map((p,i) => ({

      </div>
    </div>`
  ).join('');

  if (portfolio.length) refreshDashPortLive();
  else {
    document.getElementById('dashTotal').textContent = '₩42,873,400';
    document.getElementById('dashPnl').innerHTML = '<span class="up">▲ +14.2% (샘플 데이터)</span>';

async function refreshDashPortLive() {
  try {
    const syms = [...new Set(portfolio.map(p => p.sym))].join(',');
    const d = await api('/api/quotes?symbols=' + syms);
    const quotes = d.quoteResponse?.result || [];
    const tv = portfolio.reduce((a, p) => {
      const q = quotes.find(x => x.symbol === p.sym);
      return a + (q ? q.regularMarketPrice * p.qty : p.price * p.qty);
    }, 0);
    const ti = portfolio.reduce((a, p) => a + p.price * p.qty, 0);
    const rt = ti ? (tv-ti)/ti*100 : 0;
    document.getElementById('dashTotal').textContent = '₩' + Math.round(tv).toLocaleString();
    document.getElementById('dashPnl').innerHTML =
      `<span class="${rt>=0?'up':'dn'}">${rt>=0?'▲':'▼'} ${Math.abs(rt).toFixed(2)}%</span>`;
  } catch(e) {}
}

// PORTFOLIO PAGE
// ═══════════════════════════════════════════════════
async function renderPortPage() {
  const body = document.getElementById('portBody');
  if (!portfolio.length) {
    body.innerHTML = '<tr class="lrow"><td colspan="6">종목을 추가해 주세요</td></tr>';
    updatePortSummary([]);
    renderPie([]);
    return;
  }
  body.innerHTML = '<tr class="lrow"><td colspan="6"><div class="spinner"></div> 현재가 조회 중...</td></tr>';
  try {
    const syms = [...new Set(portfolio.map(p => p.sym))].join(',');
    const d = await api('/api/quotes?symbols=' + syms);
    const quotes = d.quoteResponse?.result || [];
    const enriched = portfolio.map(p => ({
      ...p, cur: quotes.find(x => x.symbol === p.sym)?.regularMarketPrice ?? null
    }));
    body.innerHTML = enriched.map((p, i) => {
      const inv = p.price * p.qty;
      const ev  = p.cur != null ? p.cur * p.qty : null;
      const rt  = ev != null ? (ev - inv) / inv * 100 : null;
      return `<tr>
        <td><div class="sn">${p.name||p.sym}</div><div class="sc">${p.sym}</div></td>
        <td class="r">${fmtP(p.price, p.sym)}</td>
        <td class="r">${p.qty}</td>
        <td class="r">${p.cur != null ? fmtP(p.cur, p.sym) : '—'}</td>
        <td class="r ${clr(rt)}">${rt != null ? chgStr(rt) : '—'}</td>
        <td style="text-align:right;cursor:pointer;color:var(--muted);padding-right:14px;"
            onclick="delPort(${i})">✕</td>
      </tr>`;
    }).join('');
    updatePortSummary(enriched);
    renderPie(enriched);
  } catch(e) {
    body.innerHTML = '<tr class="lrow"><td colspan="6" style="color:var(--red)">현재가 조회 실패</td></tr>';
  }
}

function updatePortSummary(items) {
  const ti = items.reduce((a, p) => a + p.price*p.qty, 0);
  const tv = items.reduce((a, p) => a + (p.cur != null ? p.cur*p.qty : p.price*p.qty), 0);
  const pnl = tv - ti;
  const rt  = ti ? pnl/ti*100 : 0;
  document.getElementById('pInvest').textContent = '₩' + Math.round(ti).toLocaleString();
  document.getElementById('pVal').textContent    = '₩' + Math.round(tv).toLocaleString();
  const pEl = document.getElementById('pPnl');
  pEl.className = 'sv ' + clr(pnl);
  pEl.textContent = (pnl >= 0 ? '+' : '') + '₩' + Math.round(pnl).toLocaleString();
  const rEl = document.getElementById('pRt');
  rEl.className = 'sv ' + clr(rt);
  rEl.textContent = (rt >= 0 ? '+' : '') + rt.toFixed(2) + '%';
}

function renderPie(items) {
  const ctx = document.getElementById('pieChart').getContext('2d');
  if (pieChartObj) { pieChartObj.destroy(); pieChartObj = null; }
  if (!items.length) return;
  pieChartObj = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: items.map(p => p.name||p.sym),
      datasets: [{ data: items.map(p => (p.cur||p.price)*p.qty),
        backgroundColor: items.map((_, i) => CHIP_COLORS[i % CHIP_COLORS.length]),
        borderWidth: 0 }]
    },
    options: { plugins: { legend: { labels: { color:'#c8d8e8', font:{size:11,family:'IBM Plex Mono'} } } }, cutout:'60%' }
  });
}

function delPort(i) {
  portfolio.splice(i, 1);
  localStorage.setItem('st_port', JSON.stringify(portfolio));
  renderPortPage();
  renderDashPort();
}

async function addPort() {
  const sym   = document.getElementById('pSym').value.trim().toUpperCase();
  const name  = document.getElementById('pName').value.trim();
  const price = parseFloat(document.getElementById('pPrice').value);
  const qty   = parseInt(document.getElementById('pQty').value);
  if (!sym || !price || !qty) return alert('모든 항목을 입력해 주세요');
  portfolio.push({ sym, name: name || sym, price, qty });
  localStorage.setItem('st_port', JSON.stringify(portfolio));
  ['pSym','pName','pPrice','pQty'].forEach(id => document.getElementById(id).value = '');
  renderPortPage();
  renderDashPort();
}

const CMP_DEFAULTS = ['NVDA', '005930.KS'];

function renderChips() {
  document.getElementById('cmpChips').innerHTML = cmpSyms.map((s, i) =>
    `<div class="chip">
      <div class="cdot" style="background:${CHIP_COLORS[i]}"></div>${s}
      <span class="cx" onclick="removeCmp('${s}')">×</span>
    </div>`
  ).join('');
}

function removeCmp(sym) {
  cmpSyms = cmpSyms.filter(s => s !== sym);
  renderChips();
  loadCmpChart();
}

async function addCmp() {
  const val = document.getElementById('cmpSearch').value.trim().toUpperCase();
  document.getElementById('cmpAC').style.display = 'none';
  if (!val || cmpSyms.includes(val) || cmpSyms.length >= 5) return;
  cmpSyms.push(val);
  document.getElementById('cmpSearch').value = '';
  renderChips();
  await loadCmpChart();
}

async function loadCmpChart() {
  const statsEl = document.getElementById('cmpStats');
  const badge   = document.getElementById('cmpBadge');
  if (!cmpSyms.length) {
    if (cmpChartObj) { cmpChartObj.destroy(); cmpChartObj = null; }
    statsEl.innerHTML = '';
    return;
  }
  badge.innerHTML = '<div class="spinner"></div>';

  const datasets = [];
  let allLabels  = [];

  for (let i = 0; i < cmpSyms.length; i++) {
    try {
      const d   = await api(`/api/chart/${encodeURIComponent(cmpSyms[i])}?range=3mo&interval=1d`);
      const res = d.chart?.result?.[0];
      if (!res) continue;
      const ts     = res.timestamp || [];
      const closes = res.indicators?.quote?.[0]?.close || [];
      if (!allLabels.length) allLabels = ts.map(t => { const dt=new Date(t*1000); return `${dt.getMonth()+1}/${dt.getDate()}`; });
      const first = closes.find(v => v != null);
      const norm  = closes.map(v => v != null && first ? parseFloat(((v-first)/first*100).toFixed(2)) : null);
      datasets.push({ label: cmpSyms[i], data: norm, borderColor: CHIP_COLORS[i],
        borderWidth: 1.5, pointRadius: 0, tension: 0.3, spanGaps: true, fill: false });
    } catch(e) { console.warn('cmp chart failed for', cmpSyms[i], e.message); }
  }

  const ctx = document.getElementById('cmpChart').getContext('2d');
  if (cmpChartObj) cmpChartObj.destroy();
  cmpChartObj = new Chart(ctx, {
    type: 'line',
    data: { labels: allLabels, datasets },
    options: {
      responsive: true, animation: false,
      plugins: { legend: { labels: { color:'#c8d8e8', font:{size:10,family:'IBM Plex Mono'} } } },
      scales: {
        x: { ticks:{color:'#4a6070',font:{size:10},maxTicksLimit:6}, grid:{color:'rgba(30,45,61,.4)'} },
        y: { ticks:{color:'#4a6070',font:{size:10},callback:v=>v+'%'}, grid:{color:'rgba(30,45,61,.4)'} }
      }
    }
  });
  badge.textContent = '3개월';

  try {
    const d = await api('/api/quotes?symbols=' + cmpSyms.join(','));
    const quotes = d.quoteResponse?.result || [];
    statsEl.innerHTML = cmpSyms.map((sym, i) => {
      const q = quotes.find(x => x.symbol === sym);
      const p = q?.regularMarketPrice;
      const c = q?.regularMarketChangePercent;
      return `<div class="sum-card" style="border-color:${CHIP_COLORS[i]}33">
        <div class="sl" style="color:${CHIP_COLORS[i]}">${sym}</div>
        <div class="sv">${fmtP(p, sym)}</div>
        <div class="${clr(c)}" style="font-family:'IBM Plex Mono',monospace;font-size:11px;">${chgStr(c)}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:5px;">${q?.shortName||''}</div>
      </div>`;
    }).join('');
  } catch(e) {}
}

// autocomplete
let acTimer;
document.getElementById('cmpSearch').addEventListener('input', e => {
  clearTimeout(acTimer);
  const q = e.target.value.trim();
  const ac = document.getElementById('cmpAC');
  if (!q) { ac.style.display = 'none'; return; }
  acTimer = setTimeout(async () => {
    try {
      const d = await api('/api/search?q=' + encodeURIComponent(q));
      const res = d.results || [];
      if (!res.length) { ac.style.display='none'; return; }
      ac.innerHTML = res.map(r =>
        `<div class="ac-item" onclick="pickAC('${r.symbol}')">
          <span class="ac-sym">${r.symbol}</span>
          <span class="ac-nm">${r.name}</span>
          <span style="font-size:9px;color:var(--muted);margin-left:auto;">${r.exchange||''}</span>
        </div>`).join('');
      ac.style.display = 'block';
    } catch(e) {}
  }, 320);
});

function pickAC(sym) {
  document.getElementById('cmpSearch').value = sym;
  document.getElementById('cmpAC').style.display = 'none';
  addCmp();
}
document.addEventListener('click', e => {
  if (!e.target.closest('.srch-wrap')) document.getElementById('cmpAC').style.display = 'none';
});

// RECOMMENDATIONS
// ═══════════════════════════════════════════════════
async function loadRec() {
  const grid = document.getElementById('recGrid');
  grid.innerHTML = '<div class="spinner" style="display:block;margin:20px auto;"></div>';
  try {
    const d = await api('/api/quotes?symbols=' + RECS.map(r => r.s).join(','));
    const quotes = d.quoteResponse?.result || [];
    grid.innerHTML = RECS.map((r, i) => {
      const q = quotes.find(x => x.symbol === r.s);
      const p = q?.regularMarketPrice;
      const c = q?.regularMarketChangePercent;
      const stars = '★'.repeat(Math.round(r.score/20)) + '☆'.repeat(5-Math.round(r.score/20));
      return `<div class="rc">
        <div class="rc-hdr">
          <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);">#${String(i+1).padStart(2,'0')}</span>
          <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--amber);">${stars} ${r.score}점</span>
        </div>
        <div class="rc-body">
          <div class="rc-tick">${r.t}</div>
          <div class="rc-rsn">${r.r}</div>
          <div class="rc-meta">
            <div class="rmi"><div class="rml">현재가</div><div class="rmv">${fmtP(p, r.s)}</div></div>
            <div class="rmi"><div class="rml">등락률</div><div class="rmv ${clr(c)}">${chgStr(c)}</div></div>
            <div class="rmi"><div class="rml">시장</div><div class="rmv" style="color:var(--muted);">${r.m}</div></div>
          </div>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    grid.innerHTML = '<div class="err-txt">데이터 로드 실패</div>';
  }
}

// ═══════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════
document.querySelectorAll('.ntab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.ntab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('page-' + tab.dataset.page).classList.add('active');
    const pg = tab.dataset.page;
    if (pg === 'portfolio') renderPortPage();
    if (pg === 'recommend') loadRec();
    if (pg === 'news')      { loadNewsPage('KR'); loadNewsPage('US'); }
    if (pg === 'compare' && !cmpSyms.length) {
      cmpSyms = [...CMP_DEFAULTS];
      renderChips();
      loadCmpChart();
    }
  });
});

// STOCK PICKER BUTTONS
document.getElementById('spRow').addEventListener('click', e => {
  const btn = e.target.closest('.sp');
  if (!btn) return;
  document.querySelectorAll('.sp').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  curSym  = btn.dataset.sym;
  curName = btn.dataset.name;
  document.getElementById('cName').textContent = curName;
  loadChart();
});

// TIMEFRAME BUTTONS
document.querySelector('.tf-row').addEventListener('click', e => {
  const btn = e.target.closest('.tf');
  if (!btn) return;
  document.querySelectorAll('.tf').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  curRange    = btn.dataset.r;
  curInterval = btn.dataset.i;
  loadChart();
});

// REFRESH BUTTONS
document.getElementById('chartRefreshBtn').addEventListener('click', loadChart);
document.getElementById('wlRefreshBtn').addEventListener('click', loadWatchlist);
document.getElementById('hmRefreshBtn').addEventListener('click', loadHeatmap);
document.getElementById('newsRefreshBtn').addEventListener('click', loadDashNews);
document.getElementById('cmpAddBtn').addEventListener('click', addCmp);
document.getElementById('cmpRefreshBtn').addEventListener('click', loadCmpChart);
document.getElementById('portAddBtn').addEventListener('click', addPort);
document.getElementById('portRefreshBtn').addEventListener('click', renderPortPage);
document.getElementById('recRefreshBtn').addEventListener('click', loadRec);
document.getElementById('newsKRRefreshBtn').addEventListener('click', () => loadNewsPage('KR'));
document.getElementById('newsUSRefreshBtn').addEventListener('click', () => loadNewsPage('US'));
document.getElementById('cmpSearch').addEventListener('keydown', e => { if (e.key === 'Enter') addCmp(); });
document.getElementById('pQty').addEventListener('keydown', e => { if (e.key === 'Enter') addPort(); });
